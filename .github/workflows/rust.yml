name: Rust

on:
  push:
    paths: 
    - "**.rs"
    - "**/Cargo.toml"
    - "rust-toolchain.toml"
    - ".github/workflows/rust.yml"
  pull_request:
  workflow_call:

env:
    CARGO_TERM_COLOR: always

jobs:

  skip_check:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5.3.1
        with:
          concurrent_skipping: 'same_content_newer'

  test:
    needs: skip_check
    if: needs.skip_check.outputs.should_skip != 'true'

    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v7.0.0
    - name: install all toolchains
      run: rustup toolchain install stable beta nightly nightly-2026-01-01
    - name: Run tests
      run: |
        cargo test
        cargo test --examples

  lint:
    needs: skip_check
    if: needs.skip_check.outputs.should_skip != 'true'

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7.0.0
    - name: clippy
      run: cargo clippy -- --deny warnings

  fmt:
    needs: skip_check
    if: needs.skip_check.outputs.should_skip != 'true'

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7.0.0
    - name: fmt
      run: cargo fmt --check

  msrv:
    needs: skip_check
    if: needs.skip_check.outputs.should_skip != 'true'

    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: crates/build_safely

    steps:
    - uses: actions/checkout@v7.0.0
    - name: install cargo-msrv
      uses: taiki-e/install-action@v2.83.0
      with:
        tool: cargo-msrv
    - name: check MSRV
      run: cargo msrv verify
